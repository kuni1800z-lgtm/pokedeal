name: pokedeal
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pokedeal
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: run
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python pokedeal.py --once
      - name: persist seen.json
        run: |
          git config user.name "pokedeal-bot"
          git config user.email "bot@users.noreply.github.com"
          if [ -n "$(git status --porcelain seen.json)" ]; then
            git add seen.json
            git commit -m "update seen [skip ci]"
            git push
          else
            echo "no changes"
          fi
