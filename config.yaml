# ====== 監視のテンポ ======
poll_interval_sec: 120
jitter_sec: 60

# ====== 通知先（GitHub ActionsではSecretsを使うので空でOK）======
ntfy_topic: ""
discord_webhook_url: ""

# ====== 「安い」と判定する基準 ======
default_discount_pct: 20      # 相場よりこの%以上安いと通知（多すぎたら数字を上げる）
reference_min_samples: 5
strict_keyword: true          # 検索語の各単語がタイトルに全部含まれる出品だけ対象にする

# ====== ノイズ除外（タイトルに含むと無視）======
exclude_keywords:
  - まとめ
  - セット
  - ロット
  - ジャンク
  - プレイ用
  - 傷あり
  - 折れ
  - 海外版
  - 中国版
  - 韓国版
  - 英語版
  - 偽物
  - コピー
  - プロキシ
  - 自作
  - 同人

# メルカリの状態IDで除外（5=傷あり, 6=状態が悪い）
mercari_exclude_condition_ids: [5, 6]

# ====== 監視対象 ======
targets:
  - name: "ゼイユ SAR"
    keyword: "ゼイユ SAR"

  - name: "ルチアのアピール SAR"
    keyword: "ルチアのアピール SAR"

  - name: "メイのはげまし SAR"
    keyword: "メイのはげまし SAR"
